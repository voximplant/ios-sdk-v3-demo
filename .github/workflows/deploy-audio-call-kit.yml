name: Deploy Audio Call Kit

on:
  workflow_dispatch:
  push:
    branches:
      - github_actions_adopt

jobs:
  deploy:
    uses: ./.github/workflows/deploy-testflight.yml
    with:
      project_dir: AudioCallKit
      xcodeproj: audio-call-kit.xcodeproj
      scheme: audio-call-kit
      bundle_id: com.voximplant.demos.v3.audiocallkit
    secrets:
      CERTIFICATES_P12: ${{ secrets.CERTIFICATES_P12 }}
      CERTIFICATES_PASSWORD: ${{ secrets.CERTIFICATES_PASSWORD }}
      PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE_AUDIOCALLKIT }}
      APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
      APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
      APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
